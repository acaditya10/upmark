<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- Architectural hand-drawn pencil effect -->
    <filter id="sketch" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="4" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.5" xChannelSelector="R" yChannelSelector="G" result="disp" />
      <feGaussianBlur in="disp" stdDeviation="0.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" opacity="0.4" />
      </feMerge>
    </filter>
    
    <!-- Paper texture background -->
    <filter id="paper">
      <feTurbulence type="fractalNoise" baseFrequency="0.01" result="noise" />
      <feDiffuseLighting in="noise" lighting-color="#ffffff" surfaceScale="1.5">
        <feDistantLight azimuth="45" elevation="60" />
      </feDiffuseLighting>
      <feBlend mode="multiply" in="SourceGraphic" in2="noise" />
    </filter>

    <style>
      .bg {
        fill: #fdfdfc;
        filter: url(#paper);
      }
      
      .orbit {
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 2000;
        stroke-dashoffset: 2000;
        filter: url(#sketch);
        animation: drawOrbit 6s infinite ease-in-out alternate;
      }
      
      /* Strategy - Midnight Blue */
      .orbit-1 { stroke: #1e3a8a; } 
      /* Creative - Golden */
      .orbit-2 { stroke: #ca8a04; } 
      /* Production - Deep Teal */
      .orbit-3 { stroke: #0f766e; } 
      /* Performance - Rich Purple */
      .orbit-4 { stroke: #6d28d9; } 
      
      @keyframes drawOrbit {
        0% { stroke-dashoffset: 2000; }
        10% { stroke-dashoffset: 2000; }
        90% { stroke-dashoffset: 0; }
        100% { stroke-dashoffset: 0; }
      }

      .construction-line {
        stroke: #cbd5e1;
        stroke-width: 1;
        fill: none;
        stroke-dasharray: 4 8;
        filter: url(#sketch);
        opacity: 0.6;
      }
      
      .grid-line {
        stroke: #e2e8f0;
        stroke-width: 0.5;
        fill: none;
        filter: url(#sketch);
      }

      .node {
        fill: #ffffff;
        stroke-width: 2;
        filter: url(#sketch);
        animation: pulseNode 3s infinite alternate ease-in-out;
      }
      
      @keyframes pulseNode {
        0% { r: 3; opacity: 0.5; }
        100% { r: 6; opacity: 1; box-shadow: 0 0 10px currentColor; }
      }

      .core {
        fill: #0f172a;
        filter: url(#sketch);
        animation: spinCore 20s infinite linear;
        transform-origin: center;
      }
      
      @keyframes spinCore {
        100% { transform: rotate(360deg); }
      }
      
      .fade-in {
        animation: fadeIn 6s infinite alternate;
      }
      
      @keyframes fadeIn {
        0%, 30% { opacity: 0; }
        70%, 100% { opacity: 1; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg" />
  
  <!-- Subtle Blueprint Grid -->
  <g class="grid-line">
    <line x1="100" y1="0" x2="100" y2="600" />
    <line x1="200" y1="0" x2="200" y2="600" />
    <line x1="300" y1="0" x2="300" y2="600" />
    <line x1="400" y1="0" x2="400" y2="600" />
    <line x1="500" y1="0" x2="500" y2="600" />
    <line x1="600" y1="0" x2="600" y2="600" />
    <line x1="700" y1="0" x2="700" y2="600" />
    
    <line x1="0" y1="100" x2="800" y2="100" />
    <line x1="0" y1="200" x2="800" y2="200" />
    <line x1="0" y1="300" x2="800" y2="300" />
    <line x1="0" y1="400" x2="800" y2="400" />
    <line x1="0" y1="500" x2="800" y2="500" />
  </g>

  <!-- Main Animation Container -->
  <g transform="translate(400, 300)">
    
    <!-- Architectural Construction Lines (Measurable/Precise) -->
    <g class="construction-line">
      <circle cx="0" cy="0" r="120" />
      <circle cx="0" cy="0" r="260" />
      <line x1="-350" y1="0" x2="350" y2="0" />
      <line x1="0" y1="-250" x2="0" y2="250" />
      <line x1="-250" y1="-250" x2="250" y2="250" />
      <line x1="-250" y1="250" x2="250" y2="-250" />
    </g>

    <!-- The 4 Disciplines forming the Integrated System -->
    
    <!-- Strategy Orbit -->
    <g transform="rotate(0)">
      <ellipse cx="0" cy="0" rx="260" ry="70" class="orbit orbit-1" stroke-width="2.5" style="animation-delay: 0s" />
      <ellipse cx="2" cy="-2" rx="258" ry="72" class="orbit orbit-1" stroke-width="1.5" opacity="0.6" style="animation-delay: 0.1s" />
      <ellipse cx="-2" cy="1" rx="262" ry="68" class="orbit orbit-1" stroke-width="1" opacity="0.4" style="animation-delay: 0.2s" />
      <circle cx="260" cy="0" class="node orbit-1 fade-in" stroke="#1e3a8a" style="animation-delay: 0s" />
    </g>
    
    <!-- Creative Orbit -->
    <g transform="rotate(45)">
      <ellipse cx="0" cy="0" rx="260" ry="70" class="orbit orbit-2" stroke-width="2.5" style="animation-delay: 0.3s" />
      <ellipse cx="2" cy="-2" rx="258" ry="72" class="orbit orbit-2" stroke-width="1.5" opacity="0.6" style="animation-delay: 0.4s" />
      <ellipse cx="-2" cy="1" rx="262" ry="68" class="orbit orbit-2" stroke-width="1" opacity="0.4" style="animation-delay: 0.5s" />
      <circle cx="260" cy="0" class="node orbit-2 fade-in" stroke="#ca8a04" style="animation-delay: 0.3s" />
    </g>

    <!-- Production Orbit -->
    <g transform="rotate(90)">
      <ellipse cx="0" cy="0" rx="260" ry="70" class="orbit orbit-3" stroke-width="2.5" style="animation-delay: 0.6s" />
      <ellipse cx="2" cy="-2" rx="258" ry="72" class="orbit orbit-3" stroke-width="1.5" opacity="0.6" style="animation-delay: 0.7s" />
      <ellipse cx="-2" cy="1" rx="262" ry="68" class="orbit orbit-3" stroke-width="1" opacity="0.4" style="animation-delay: 0.8s" />
      <circle cx="260" cy="0" class="node orbit-3 fade-in" stroke="#0f766e" style="animation-delay: 0.6s" />
    </g>

    <!-- Performance Orbit -->
    <g transform="rotate(135)">
      <ellipse cx="0" cy="0" rx="260" ry="70" class="orbit orbit-4" stroke-width="2.5" style="animation-delay: 0.9s" />
      <ellipse cx="2" cy="-2" rx="258" ry="72" class="orbit orbit-4" stroke-width="1.5" opacity="0.6" style="animation-delay: 1.0s" />
      <ellipse cx="-2" cy="1" rx="262" ry="68" class="orbit orbit-4" stroke-width="1" opacity="0.4" style="animation-delay: 1.1s" />
      <circle cx="260" cy="0" class="node orbit-4 fade-in" stroke="#6d28d9" style="animation-delay: 0.9s" />
    </g>

    <!-- The Integrated Core -->
    <g class="fade-in" style="animation-delay: 1.5s">
      <!-- Geometric star/burst representing unity -->
      <path d="M 0 -30 L 8 -10 L 30 0 L 8 10 L 0 30 L -8 10 L -30 0 L -8 -10 Z" class="core" />
      <circle cx="0" cy="0" r="12" fill="#ffffff" filter="url(#sketch)" />
      <circle cx="0" cy="0" r="4" fill="#0f172a" filter="url(#sketch)" />
    </g>
    
    <!-- Outer measurement ticks -->
    <g class="construction-line fade-in" style="animation-delay: 2s">
      <path d="M -260 -10 L -260 10 M 260 -10 L 260 10 M -10 -260 L 10 -260 M -10 260 L 10 260" stroke-width="2" />
    </g>
    
  </g>
</svg>
